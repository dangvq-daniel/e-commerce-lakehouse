ecommerce_analytics:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    databricks:
      type: databricks
      catalog: "{{ env_var('DATABRICKS_CATALOG', 'ecommerce') }}"
      schema: analytics
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      token: "{{ env_var('DATABRICKS_TOKEN') }}"
      threads: 8
    dev:
      type: postgres
      host: "{{ env_var('WAREHOUSE_HOST', 'localhost') }}"
      port: "{{ env_var('WAREHOUSE_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'ecommerce') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'ecommerce') }}"
      dbname: "{{ env_var('WAREHOUSE_DB', 'warehouse') }}"
      schema: analytics
      threads: 4
      connect_timeout: 10
