resources:
  jobs:
    ecommerce_bronze_pipeline:
      name: ecommerce-bronze-${bundle.target}
      max_concurrent_runs: 1
      queue:
        enabled: true
      job_clusters:
        - job_cluster_key: streaming_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            autoscale:
              min_workers: 1
              max_workers: 4
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: kafka_ingestion
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: ../notebooks/01_kafka_ingestion.py
            base_parameters:
              catalog: ${var.catalog}
              kafka_bootstrap_servers: ${var.kafka_bootstrap_servers}
              trigger_mode: available_now
        - task_key: bronze_events
          depends_on:
            - task_key: kafka_ingestion
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: ../notebooks/02_bronze_layer.py
            base_parameters:
              catalog: ${var.catalog}
              trigger_mode: available_now

    ecommerce_silver_pipeline:
      name: ecommerce-silver-${bundle.target}
      max_concurrent_runs: 1
      queue:
        enabled: true
      job_clusters:
        - job_cluster_key: streaming_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            autoscale:
              min_workers: 1
              max_workers: 4
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: silver_events
          job_cluster_key: streaming_cluster
          notebook_task:
            notebook_path: ../notebooks/03_silver_layer.py
            base_parameters:
              catalog: ${var.catalog}
              trigger_mode: available_now

    ecommerce_quality_checks:
      name: ecommerce-quality-${bundle.target}
      max_concurrent_runs: 1
      queue:
        enabled: true
      job_clusters:
        - job_cluster_key: quality_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            autoscale:
              min_workers: 1
              max_workers: 2
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: quality_checks
          job_cluster_key: quality_cluster
          notebook_task:
            notebook_path: ../notebooks/05_quality_checks.py
            base_parameters:
              catalog: ${var.catalog}
          email_notifications:
            on_failure:
              - data-platform@example.com

    ecommerce_warehouse_publish:
      name: ecommerce-warehouse-publish-${bundle.target}
      max_concurrent_runs: 1
      queue:
        enabled: true
      job_clusters:
        - job_cluster_key: publish_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            node_type_id: i3.xlarge
            autoscale:
              min_workers: 1
              max_workers: 2
            data_security_mode: SINGLE_USER
      tasks:
        - task_key: publish_gold_to_postgres
          job_cluster_key: publish_cluster
          notebook_task:
            notebook_path: ../notebooks/04_warehouse_load.py
            base_parameters:
              catalog: ${var.catalog}
              postgres_jdbc_url: ${var.postgres_jdbc_url}
              postgres_secret_scope: ${var.postgres_secret_scope}
          libraries:
            - maven:
                coordinates: org.postgresql:postgresql:42.7.5
