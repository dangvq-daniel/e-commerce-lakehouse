services:
  - type: web
    name: ecommerce-lakehouse-demo
    runtime: node
    plan: free
    region: ohio
    rootDir: recruiter-site
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        sync: false
      - key: DEMO_STREAMING_ENABLED
        value: "true"
      - key: EVENT_INTERVAL_MS
        value: "60000"
      - key: SEED_EVENT_COUNT
        value: "1500"
      - key: MAX_EVENT_ROWS
        value: "50000"
      - key: EVENT_RETENTION_DAYS
        value: "35"
      - key: DATABASE_WRITE_GUARD_BYTES
        value: "200000000"
