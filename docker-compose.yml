name: ecommerce-lakehouse

x-postgres-environment: &postgres-environment
  POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
  POSTGRES_DB: ${POSTGRES_DB:-airflow}

x-airflow-common: &airflow-common
  image: ecommerce-lakehouse-airflow:local
  build:
    context: .
    dockerfile: airflow/Dockerfile
  profiles: ["orchestration"]
  environment: &airflow-environment
    <<: *postgres-environment
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-ecommerce}:${POSTGRES_PASSWORD:-ecommerce}@postgres:5432/${POSTGRES_DB:-airflow}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-local-only-change-me}
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    PYTHONPATH: /opt/airflow
    KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    WAREHOUSE_HOST: postgres
    WAREHOUSE_PORT: 5432
    WAREHOUSE_DB: ${WAREHOUSE_DB:-warehouse}
    DBT_PROFILES_DIR: /opt/airflow/dbt
    DBT_TARGET: ${DBT_TARGET:-dev}
    DATABRICKS_HOST: ${DATABRICKS_HOST:-}
    DATABRICKS_TOKEN: ${DATABRICKS_TOKEN:-}
    DATABRICKS_CATALOG: ${DATABRICKS_CATALOG:-ecommerce}
    DATABRICKS_HTTP_PATH: ${DATABRICKS_HTTP_PATH:-}
    DATABRICKS_BRONZE_JOB_ID: ${DATABRICKS_BRONZE_JOB_ID:-}
    DATABRICKS_SILVER_JOB_ID: ${DATABRICKS_SILVER_JOB_ID:-}
    DATABRICKS_QUALITY_JOB_ID: ${DATABRICKS_QUALITY_JOB_ID:-}
    DATABRICKS_WAREHOUSE_JOB_ID: ${DATABRICKS_WAREHOUSE_JOB_ID:-}
    METABASE_URL: http://metabase:3000
    METABASE_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@example.com}
    METABASE_ADMIN_PASSWORD: ${METABASE_ADMIN_PASSWORD:-metabase123!}
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - ./airflow/include:/opt/airflow/include:ro
    - ./dbt:/opt/airflow/dbt:ro
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy
    kafka:
      condition: service_healthy

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/topics/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["bash", "/create-topics.sh"]
    restart: "no"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment: *postgres-environment
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./warehouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce} -d ${POSTGRES_DB:-airflow}"]
      interval: 5s
      timeout: 5s
      retries: 12

  generator:
    build:
      context: .
      dockerfile: generator/Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EVENT_RATE: ${EVENT_RATE:-5}
      EVENT_RATE_JITTER: ${EVENT_RATE_JITTER:-0.25}
      EVENT_SEED: ${EVENT_SEED:-42}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  event-sink:
    build:
      context: .
      dockerfile: warehouse/Dockerfile
    environment:
      <<: *postgres-environment
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      WAREHOUSE_HOST: postgres
      WAREHOUSE_PORT: 5432
      WAREHOUSE_DB: ${WAREHOUSE_DB:-warehouse}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.50.31
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabaseapp
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-ecommerce}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-ecommerce}
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  dashboard-bootstrap:
    build: ./dashboards
    environment:
      METABASE_URL: http://metabase:3000
      METABASE_ADMIN_EMAIL: ${METABASE_ADMIN_EMAIL:-admin@example.com}
      METABASE_ADMIN_PASSWORD: ${METABASE_ADMIN_PASSWORD:-metabase123!}
      METABASE_ADMIN_FIRST_NAME: ${METABASE_ADMIN_FIRST_NAME:-Data}
      METABASE_ADMIN_LAST_NAME: ${METABASE_ADMIN_LAST_NAME:-Admin}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      WAREHOUSE_DB: ${WAREHOUSE_DB:-warehouse}
      WAREHOUSE_HOST: postgres
      WAREHOUSE_PORT: 5432
    depends_on:
      metabase:
        condition: service_healthy
    restart: "no"

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - >-
        airflow db migrate &&
        (airflow users create
        --username "$${AIRFLOW_ADMIN_USERNAME:-admin}"
        --password "$${AIRFLOW_ADMIN_PASSWORD:-admin}"
        --firstname Data --lastname Admin --role Admin
        --email admin@example.com || true)
    environment:
      <<: *airflow-environment
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  kafka-data:
  postgres-data:
  airflow-logs:
